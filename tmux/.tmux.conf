### general settings
set -g mouse on
set -s escape-time 0

# start window/pane numbering at 1 (matches the keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# when a session is destroyed, hop to another session instead of detaching
# (keeps the "sessions are tabs" feel — closing a tab lands you on the next one)
set -g detach-on-destroy off

### status line — rose-pine, transparent, top
# rose-pine palette
#   base #191724  surface #1f1d2e  overlay #26233a  muted #6e6a86
#   subtle #908caa  text #e0def4  love #eb6f92  gold #f6c177
#   rose #ebbcba  pine #31748f  foam #9ccfd8  iris #c4a7e7
#
# The bar bg is `default` so it inherits ghostty's transparent terminal
# background — only the segment "pills" carry color. Rounded nerd-font caps
# ( U+E0B6 /  U+E0B4) wrap each pill so the glyphs blend into the transparent bar.
set-option -g status-position top
set-option -g status-justify left
set-option -g status-style "bg=default,fg=#908caa"
set-option -g status-left-length 100
set-option -g status-right-length 100

# left: tiny gap, then the window list as tabs
set-option -g status-left " "

# right: date/time (subtle), prefix indicator, then the session pill (iris)
set-option -g status-right "#[fg=#908caa,bg=default] %Y-%m-%d %H:%M #{?client_prefix,#[fg=#eb6f92]󰌌 ,}#[fg=#c4a7e7,bg=default]#[fg=#191724,bg=#c4a7e7,bold] #S #[fg=#c4a7e7,bg=default]"

# window tabs: active = gold rounded pill w/ dark text; inactive = dim & plain
set-option -g window-status-separator ""
set-option -g window-status-format "#[fg=#6e6a86,bg=default]  #I: #W #{?window_zoomed_flag,󰊓 ,}"
set-option -g window-status-current-format "#[fg=#f6c177,bg=default]#[fg=#191724,bg=#f6c177,bold]#I: #F #W #{?window_zoomed_flag,󰊓 ,}#[fg=#f6c177,bg=default]"

# messages + pane borders in palette
set-option -g message-style "bg=#26233a,fg=#e0def4"
set-option -g message-command-style "bg=#26233a,fg=#e0def4"
set-option -g pane-border-style "fg=#26233a"
set-option -g pane-active-border-style "fg=#c4a7e7"

### keybinds
set -g prefix C-Space

# source tmux conf
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# toggle tmux status line
bind-key _ set-option -g status

# switch panes with vim keybinds
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

### splits — memorable & open in the current directory
# | = vertical split (panes side by side), - = horizontal split (panes stacked)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

### sessions-as-tabs
# Sessions are the "tabs" of the workflow. These bindings create, list,
# cycle, and rename them quickly. (All are pressed after the C-Space prefix.)
#
#   C-c  -> new session (prompts for a name)
#   s    -> session picker (choose-tree, sessions only, zoomed)
#   H/L  -> previous / next session (repeatable)
#   Space-> jump to the last-used session (alt-tab style)
#   R    -> rename the current session
bind C-c command-prompt -p "new session:" "new-session -s '%%'"
bind s choose-tree -Zs
bind -r H switch-client -p
bind -r L switch-client -n
bind Space switch-client -l
bind R command-prompt -I "#S" "rename-session -- '%%'"

### plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

# restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# theme: hand-rolled rose-pine status line above (no status-line plugin)

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
