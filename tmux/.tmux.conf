### general settings
set -g mouse on
set -s escape-time 0

# start window/pane numbering at 1 (matches the keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# when a session is destroyed, hop to another session instead of detaching
# (keeps the "sessions are tabs" feel — closing a tab lands you on the next one)
set -g detach-on-destroy off

set-option -g status-position bottom
set-option -g status-left ' #S '  # Session name
set-option -g status-right ' '  # Session name

### keybinds
set -g prefix C-Space

# source tmux conf
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# toggle tmux status line
bind-key _ set-option -g status

# switch panes with vim keybinds
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

### splits — memorable & open in the current directory
# | = vertical split (panes side by side), - = horizontal split (panes stacked)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

### sessions-as-tabs
# Sessions are the "tabs" of the workflow. These bindings create, list,
# cycle, and rename them quickly. (All are pressed after the C-Space prefix.)
#
#   C-c  -> new session (prompts for a name)
#   s    -> session picker (choose-tree, sessions only, zoomed)
#   H/L  -> previous / next session (repeatable)
#   Space-> jump to the last-used session (alt-tab style)
#   R    -> rename the current session
bind C-c command-prompt -p "new session:" "new-session -s '%%'"
bind s choose-tree -Zs
bind -r H switch-client -p
bind -r L switch-client -n
bind Space switch-client -l
bind R command-prompt -I "#S" "rename-session -- '%%'"

### plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

# restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# theme 
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-indicator false
set -g @minimal-tmux-justify "left"
# set -g @minimal-tmux-bg "#7d7373"
# set -g @minimal-tmux-fg "#ffffff"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
